name: gitconfig
description: Git configuration — delta diff viewer, lazygit TUI, catppuccin-mocha theme, useful aliases
platforms:
  - macos
  - linux
links:
  - source: .gitconfig
    target: ~/.gitconfig
dependencies:
  brew:
    - git
    - delta
    - git-lfs
    - lazygit
  apt:
    - git
    - git-delta
    - git-lfs
  pacman:
    - git
    - git-delta
    - git-lfs
    - lazygit
  dnf:
    - git
    - git-delta
    - git-lfs
  zypper:
    - git
    - git-delta
    - git-lfs
